p { font-size: 16px; color: var(--muted); max-width: 420px; text-align: center; line-height: 1.7; margin-bottom: 36px; }
.btn { display: inline-block; background: var(--btnBg); color: var(--btnText); padding: 13px 28px; border-radius: 999px; font-weight: 700; font-size: 15px; text-decoration: none; transition: opacity 0.15s; margin: 0 6px 10px; }
.btn:hover { opacity: 0.88; }
.btn-ghost { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
